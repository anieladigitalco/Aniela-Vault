<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DateBloom | Premium Date Invitations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght=700&family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ambient-background">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <main class="app-container">
        
        <!-- SCREEN 1: LANDING & SENDER FORM -->
        <section class="screen active" id="screen-landing">
            <div class="brand-header">
                <span class="brand-badge">🌸 DateBloom</span>
                <h1 class="brand-tagline">Create Your Date Invitation</h1>
                <p class="brand-subtext">Craft a beautiful, premium experience for someone special.</p>
            </div>

            <div class="glass-card">
                <div class="avatar-wrapper">
                    <img src="assets/bear.gif" alt="🐻" class="brand-avatar">
                </div>

                <form id="senderForm" autocomplete="off">
                    <div class="input-group">
                        <label for="senderName"><i class="fa-regular fa-user"></i> Your Name</label>
                        <input type="text" id="senderName" placeholder="e.g., Angel" required>
                    </div>

                    <div class="input-group">
                        <label for="senderEmail"><i class="fa-regular fa-envelope"></i> Your Email</label>
                        <input type="email" id="senderEmail" placeholder="name@example.com" required>
                    </div>

                    <div class="input-group">
                        <label for="recipientName"><i class="fa-solid fa-heart-pulse"></i> Recipient's Name</label>
                        <input type="text" id="recipientName" placeholder="e.g., Sophia" required>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Continue <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>
            </div>
        </section>

        <!-- SCREEN 2: QUESTION SELECTION -->
        <section class="screen" id="screen-questions">
            <div class="brand-header">
                <span class="brand-badge" id="questionCounter">❤️ Selected: 0 / 3</span>
                <h1 class="brand-tagline">Choose 3 Questions</h1>
                <p class="brand-subtext">Pick the perfect prompts for <span id="dynamicRecipient" style="font-weight:600; color:var(--deep-pink);"></span></p>
            </div>

            <div class="questions-grid" id="questionsGrid">
                <!-- Dynamic cards mapuno halin sa JS -->
            </div>

            <button type="button" class="btn btn-primary" id="btnContinueToFlow" disabled style="opacity: 0.5; margin-top: 20px;">
                Perfect! Continue <i class="fa-solid fa-arrow-right"></i>
            </button>
        </section>

    </main>

    <footer class="brand-footer">
        <p>Made with <span class="heart-pulse">❤️</span> by <span class="company-name">Aniela Digital Co.</span></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
