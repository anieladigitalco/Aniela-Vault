<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DateBloom 💖</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background-hearts"></div>

<div class="container">

<h1>DateBloom 🌸</h1>

<p class="subtitle">
Create your personalized date invitation 💕
</p>

<form id="senderForm">

<label>Your Name</label>

<input
type="text"
id="senderName"
placeholder="Enter your name"
required>

<label>Your Email</label>

<input
type="email"
id="senderEmail"
placeholder="Enter your email"
required>

<label>Recipient's Name</label>

<input
type="text"
id="receiverName"
placeholder="Who are you inviting?"
required>

<button type="submit">

Continue ❤️

</button>

</form>

<p class="footer">

Made with ❤️ by
<strong>Aniela Digital Co.</strong>

</p>

</div>

<script src="script.js"></script>

</body>

</html>
